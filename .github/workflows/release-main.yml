name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.2.0)'
        required: true
        default: 'v2.2.0'

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (arm64 only)
        run: flutter build apk --release --target-platform=android-arm64 --obfuscate --split-debug-info=/tmp/debug-info

      - name: Upload Android arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

  create-release:
    needs: build-android-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: android-arm64-apk
          path: release

      - name: Get version number
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Rename artifact for release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mv release/app-arm64-v8a-release.apk "release/DNSTT-Client-${VERSION}-Android-arm64-v8a.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: DNSTT Client ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## DNSTT Client Android (ARM64)
            - Latest build for Android arm64 only.
          draft: false
          prerelease: ${{ contains(github.event.inputs.version || github.ref_name, 'beta') || contains(github.event.inputs.version || github.ref_name, 'alpha') }}
          files: |
            release/DNSTT-Client-*-Android-arm64-v8a.apk
